<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToonFlow — 短剧 AI 创作平台</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="app">
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="header-left">
      <div class="logo">🎬 ToonFlow</div>
      <nav class="main-nav">
        <button class="nav-btn active" data-page="projects">📁 项目列表</button>
        <button class="nav-btn" data-page="production">🎬 创作工作台</button>
        <button class="nav-btn" data-page="tasks">📋 任务中心</button>
        <button class="nav-btn" data-page="settings">⚙️ 系统设置</button>
      </nav>
    </div>
    <div class="header-right">
      <span id="ws-status" class="status-dot status-disconnected"></span>
      <span id="project-name" class="project-badge"></span>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- ===== 项目列表页 ===== -->
    <section id="page-projects" class="page active">
      <div class="page-header">
        <h2>项目列表</h2>
        <button class="btn btn-primary" id="btn-new-project">＋ 新建项目</button>
      </div>
      <div id="project-list" class="project-grid"></div>
      <div id="project-empty" class="empty-state">
        <div class="empty-icon">📁</div>
        <p>还没有项目，点击「新建项目」开始创作</p>
      </div>
    </section>

    <!-- ===== 创作工作台 ===== -->
    <section id="page-production" class="page">
      <div class="production-layout">
        <!-- 左侧：资产与画风 -->
        <aside class="production-sidebar">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="assets">资产</button>
            <button class="sidebar-tab" data-tab="styles">画风</button>
            <button class="sidebar-tab" data-tab="scripts">剧本</button>
          </div>

          <!-- 资产面板 -->
          <div class="sidebar-panel active" id="panel-assets">
            <div class="panel-toolbar">
              <button class="btn btn-sm btn-outline" id="btn-add-role">＋ 角色</button>
              <button class="btn btn-sm btn-outline" id="btn-add-scene">＋ 场景</button>
              <button class="btn btn-sm btn-outline" id="btn-add-prop">＋ 道具</button>
            </div>
            <div id="asset-list" class="asset-list"></div>
          </div>

          <!-- 画风面板 -->
          <div class="sidebar-panel" id="panel-styles">
            <div id="style-list" class="style-list"></div>
          </div>

          <!-- 剧本面板 -->
          <div class="sidebar-panel" id="panel-scripts">
            <textarea id="sidebar-script" placeholder="在此输入或粘贴剧本...&#10;&#10;支持格式：&#10;镜头1：场景描述&#10;镜头2：..."></textarea>
            <button class="btn btn-primary btn-block" id="btn-parse-script">📖 解析为分镜</button>
          </div>
        </aside>

        <!-- 中间：分镜编辑区 -->
        <div class="production-main">
          <div class="main-toolbar">
            <div class="toolbar-left">
              <span class="toolbar-title">分镜编辑</span>
              <span id="storyboard-count" class="toolbar-count">0 个分镜</span>
            </div>
            <div class="toolbar-right">
              <button class="btn btn-sm btn-outline" id="btn-gen-storyboard">🤖 AI 生成分镜</button>
              <button class="btn btn-sm btn-outline" id="btn-gen-images">🎨 批量生成图片</button>
              <button class="btn btn-sm btn-primary" id="btn-gen-video">🎬 生成视频</button>
            </div>
          </div>
          <div id="storyboard-container" class="storyboard-container">
            <div id="storyboard-empty" class="empty-state">
              <div class="empty-icon">🎞️</div>
              <p>输入剧本后点击「AI 生成分镜」或手动添加分镜</p>
            </div>
            <div id="storyboard-list" class="storyboard-list"></div>
          </div>
        </div>

        <!-- 右侧：视频轨道 -->
        <aside class="production-right-panel">
          <div class="panel-title">视频轨道</div>
          <div id="video-tracks" class="video-tracks">
            <div class="empty-state-sm">
              <p>生成图片后此处显示视频轨道</p>
            </div>
          </div>
          <div id="video-preview-area" class="video-preview-area" style="display:none;">
            <video id="output-video" controls></video>
            <a id="download-link" class="btn btn-primary btn-block" download>⬇️ 下载成片</a>
          </div>
        </aside>
      </div>
    </section>

    <!-- ===== 任务中心页 ===== -->
    <section id="page-tasks" class="page">
      <div class="page-header">
        <h2>任务中心</h2>
        <span id="task-stats" class="task-stats">等待中: 0 | 进行中: 0 | 已完成: 0 | 失败: 0</span>
      </div>
      <div id="task-list" class="task-list"></div>
    </section>

    <!-- ===== 系统设置页 ===== -->
    <section id="page-settings" class="page">
      <div class="page-header">
        <h2>系统设置</h2>
      </div>
      <div class="settings-layout">
        <div class="settings-tabs">
          <button class="settings-tab active" data-tab="vendors">AI 供应商</button>
          <button class="settings-tab" data-tab="models">模型配置</button>
          <button class="settings-tab" data-tab="general">常规设置</button>
        </div>
        <div class="settings-content">
          <!-- AI 供应商 -->
          <div class="settings-panel active" id="panel-vendors">
            <div class="panel-header">
              <h3>AI 供应商管理</h3>
              <button class="btn btn-sm btn-primary" id="btn-add-vendor">＋ 添加供应商</button>
            </div>
            <div id="vendor-list" class="vendor-list"></div>
          </div>
          <!-- 模型配置 -->
          <div class="settings-panel" id="panel-models">
            <div class="panel-header">
              <h3>模型测试</h3>
            </div>
            <div class="model-test-area">
              <div class="test-row">
                <label>文本模型测试</label>
                <button class="btn btn-sm btn-outline" id="btn-test-text">测试</button>
              </div>
              <div class="test-row">
                <label>图像模型测试</label>
                <button class="btn btn-sm btn-outline" id="btn-test-image">测试</button>
              </div>
              <div class="test-row">
                <label>视频模型测试</label>
                <button class="btn btn-sm btn-outline" id="btn-test-video">测试</button>
              </div>
            </div>
          </div>
          <!-- 常规设置 -->
          <div class="settings-panel" id="panel-general">
            <div class="form-group">
              <label>输出目录</label>
              <input type="text" id="set-output-dir" value="output">
            </div>
            <div class="form-group">
              <label>默认帧率</label>
              <input type="number" id="set-fps" value="24">
            </div>
            <div class="form-group">
              <label>默认分辨率</label>
              <select id="set-resolution">
                <option value="1280x720">720P (1280x720)</option>
                <option value="1920x1080">1080P (1920x1080)</option>
              </select>
            </div>
            <div class="form-group">
              <label>最大并发任务数</label>
              <input type="number" id="set-max-tasks" value="5">
            </div>
            <div class="form-group">
              <label>FFmpeg 路径</label>
              <input type="text" id="set-ffmpeg" value="ffmpeg">
            </div>
            <button class="btn btn-primary" id="btn-save-settings">💾 保存设置</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- 底部状态栏 -->
  <footer class="status-bar">
    <span id="status-left">就绪</span>
    <span id="status-center">
      <span id="active-tasks-display">活跃任务: 0</span>
      &nbsp;|&nbsp;
      <span id="project-display">当前项目: 无</span>
    </span>
    <span id="status-right">v1.0.0</span>
  </footer>
</div>

<!-- 新建项目弹窗 -->
<div id="modal-new-project" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3>新建项目</h3>
      <button class="modal-close" id="btn-close-modal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>项目名称</label>
        <input type="text" id="proj-name" placeholder="例如：我的第一部长篇短剧">
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea id="proj-intro" rows="3" placeholder="简要描述你的故事..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>题材类型</label>
          <select id="proj-type">
            <option value="">请选择</option>
            <option value="comedy">喜剧</option>
            <option value="drama">剧情</option>
            <option value="romance">爱情</option>
            <option value="horror">恐怖</option>
            <option value="scifi">科幻</option>
            <option value="mystery">悬疑</option>
            <option value="action">动作</option>
            <option value="fantasy">奇幻</option>
          </select>
        </div>
        <div class="form-group">
          <label>画风</label>
          <select id="proj-artstyle"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>画面比例</label>
          <select id="proj-ratio">
            <option value="16:9">横屏 16:9</option>
            <option value="9:16">竖屏 9:16</option>
          </select>
        </div>
        <div class="form-group">
          <label>图片模型</label>
          <select id="proj-image-model">
            <option value="">默认</option>
            <option value="dall-e-3">DALL-E 3</option>
            <option value="flux">FLUX</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancel-project">取消</button>
      <button class="btn btn-primary" id="btn-create-project">创建项目</button>
    </div>
  </div>
</div>

<!-- 资产编辑弹窗 -->
<div id="modal-asset" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3 id="asset-modal-title">添加资产</h3>
      <button class="modal-close" id="btn-close-asset-modal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>名称</label>
        <input type="text" id="asset-name" placeholder="例如：小明">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="asset-desc" rows="3" placeholder="角色的外貌特征、性格等"></textarea>
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="asset-type">
          <option value="role">角色</option>
          <option value="scene">场景</option>
          <option value="prop">道具</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancel-asset">取消</button>
      <button class="btn btn-primary" id="btn-save-asset">保存</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
